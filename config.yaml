# DPO Training Configuration for Qwen2-4B on the secalign dataset

# -----------------
# Model Arguments
# -----------------
model_name_or_path: "/scratch/public_models/huggingface/Qwen/Qwen3-4B"
# model_name_or_path: "/scratch/public_models/huggingface/Qwen/Qwen2.5-0.5B-Instruct"
# model_name_or_path: "/scratch/public_models/huggingface/meta-llama/Llama-3.2-1B-Instruct"
dtype: "bfloat16"
attn_implementation: "flash_attention_2"

# -----------------
# Data Arguments
# -----------------
# The dataset to use for DPO training. It must contain 'prompt', 'chosen', and 'rejected' columns.
dataset_name: "thavens/Qwen3-4B-secalign"

# -------------------------
# DPO Training Arguments
# -------------------------
# Directory to save the trained model and training artifacts.
use_liger_kernel: true
# use_liger_loss: true
output_dir: "./results_dpo_qwen_secalign"

beta: 0.1
learning_rate: 1.6e-4
max_prompt_length: 512
max_length: 1024
num_train_epochs: 3

per_device_train_batch_size: 4
gradient_accumulation_steps: 8
gradient_checkpointing: true
lr_scheduler_type: "cosine"
warmup_steps: 10
logging_steps: 1
save_strategy: "epoch"
bf16: true
remove_unused_columns: false
report_to: "wandb"
