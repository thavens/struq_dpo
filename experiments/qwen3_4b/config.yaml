model_args:
  model_name_or_path: "/scratch/public_models/huggingface/Qwen/Qwen3-4B"
  dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

data_args:
  dataset_name: "thavens/Qwen3-4B-secalign"

lora_args:
  r: 32
  lora_alpha: 8
  lora_dropout: 0.1
  bias: "none"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "gate_proj"
    - "down_proj"
    - "up_proj"

trainer_args:
  use_liger_kernel: true
  output_dir: "./results_dpo_qwen_secalign_lr_2e-5"

  beta: 0.1
  learning_rate: 1.6e-4
  max_prompt_length: 512
  max_length: 1024
  num_train_epochs: 3

  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  lr_scheduler_type: "cosine"
  warmup_steps: 10
  logging_steps: 1
  save_strategy: "epoch"
  bf16: true
  remove_unused_columns: false
  report_to: "wandb"
