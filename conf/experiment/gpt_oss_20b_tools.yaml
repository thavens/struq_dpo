# @package _global_
model_args:
  model_name_or_path: "openai/gpt-oss-20b"
  attn_implementation: "kernels-community/vllm-flash-attn3"
  quantization: "mxfp4"
  dequantize: true
  use_kernels: false

data_args:
  dataset_name: "thavens/gpt-oss-20b-secalign-tools"

format_args:
  ablate_context: false

lora_args:
  lora_dropout: 0
  r: 8
  target_modules:
    # - "q_proj"
    # - "v_proj"
    # - "gate_proj"
    # - "down_proj"
    # - "up_proj"
    - "experts"

trainer_args:
  learning_rate: 5e-5
  run_name: gpt-oss-20b_secalign_tools_ld_0.1_ad_0.1
  output_dir: outputs/${trainer_args.run_name}

  per_device_train_batch_size: 8
  gradient_accumulation_steps: 8

  gradient_checkpointing_kwargs:
    use_reentrant: false
  
  save_only_model: true
